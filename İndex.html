<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Takip Otomasyonu v2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .table-responsive { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div class="card p-4 mb-4">
                <h3 class="text-center mb-4 text-primary fw-bold">STOK TAKİP SİSTEMİ</h3>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold">Barkod / Ürün Kodu</label>
                    <input type="text" id="barkod" class="form-control form-control-lg" placeholder="Barkodu okutun veya yazın">
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold">Ürün Adı</label>
                    <input type="text" id="urunAdi" class="form-control form-control-lg" placeholder="Örn: Kağıt Havlu 12'li">
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold">Stok Adedi</label>
                    <input type="number" id="adet" class="form-control form-control-lg" placeholder="0">
                </div>
                
                <button onclick="stokEkle()" class="btn btn-primary btn-lg w-100 fw-bold mt-2">Ürünü Depoya Ekle</button>
            </div>

            <div class="card p-4">
                <h5 class="fw-bold mb-3 text-secondary">Depodaki Ürünler</h5>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Barkod</th>
                                <th>Ürün Adı</th>
                                <th class="text-end">Adet</th>
                            </tr>
                        </thead>
                        <tbody id="stokTablosu">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // Sayfa yüklendiğinde hafızadaki ürünleri getir
    window.onload = function() {
        listele();
    };

    function stokEkle() {
        let barkod = document.getElementById('barkod').value.trim();
        let ad = document.getElementById('urunAdi').value.trim();
        let adet = document.getElementById('adet').value.trim();

        if(!barkod || !ad || !adet) {
            alert("Lütfen tüm alanları eksiksiz doldurun!");
            return;
        }

        // LocalStorage (Tarayıcı Hafızası) Yönetimi
        let urunler = JSON.parse(localStorage.getItem('depoStok')) || [];
        
        // Aynı barkod varsa adedini artır, yoksa yeni ekle
        let varOlanUrun = urunler.find(u => u.barkod === barkod);
        if(varOlanUrun) {
            varOlanUrun.adet = parseInt(varOlanUrun.adet) + parseInt(adet);
        } else {
            urunler.push({ barkod: barkod, ad: ad, adet: parseInt(adet) });
        }

        localStorage.setItem('depoStok', JSON.stringify(urunler));
        
        // Formu temizle ve listeyi yenile
        document.getElementById('barkod').value = '';
        document.getElementById('urunAdi').value = '';
        document.getElementById('adet').value = '';
        
        listele();
    }

    function listele() {
        let urunler = JSON.parse(localStorage.getItem('depoStok')) || [];
        let tablo = document.getElementById('stokTablosu');
        tablo.innerHTML = '';

        if(urunler.length === 0) {
            tablo.innerHTML = `<tr><td colspan="3" class="text-center text-muted py-3">Depoda henüz ürün yok.</td></tr>`;
            return;
        }

        urunler.forEach(urun => {
            tablo.innerHTML += `
                <tr>
                    <td><code>${urun.barkod}</code></td>
                    <td class="fw-semibold">${urun.ad}</td>
                    <td class="text-end text-success fw-bold">${urun.adet}</td>
                </tr>
            `;
        });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
