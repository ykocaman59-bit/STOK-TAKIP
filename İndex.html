<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Takip Sistemi</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; text-align: center; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .liste { margin-top: 20px; text-align: left; }
        .urun { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <h2>Stok Takip Otomasyonu</h2>
    <input type="text" id="barkod" placeholder="Barkod / Ürün Kodu">
    <input type="text" id="urunAdi" placeholder="Ürün Adı">
    <input type="number" id="adet" placeholder="Adet">
    <button onclick="ekle()">Ürünü Listeye Ekle</button>

    <div class="liste" id="stokListesi"></div>
</div>

<script>
    function ekle() {
        let barkod = document.getElementById('barkod').value;
        let ad = document.getElementById('urunAdi').value;
        let adet = document.getElementById('adet').value;

        if(!barkod || !ad || !adet) { alert("Boş alan bırakmayın!"); return; }

        let liste = document.getElementById('stokListesi');
        liste.innerHTML += `<div class="urun"><span><strong>${ad}</strong> (${barkod})</span> <span>${adet} Adet</span></div>`;

        document.getElementById('barkod').value = '';
        document.getElementById('urunAdi').value = '';
        document.getElementById('adet').value = '';
    }
</script>

</body>
</html>
